{% extends "base.html" %}
{% block title %}Pelagia{% endblock %}
{% block body_class %}landing-body{% endblock %}

{% block content %}
<section class="landing-hero">
    <div class="landing-copy">
        <div class="landing-brand">
            <span class="brand-mark large"></span>
            <h1>Pelagia</h1>
        </div>
        <p>Log you dive. Find your buddy.</p>
    </div>
    <div class="auth-grid">
        <section class="auth-panel auth-card" data-auth-panel>
            <div class="auth-header">
                <p class="eyebrow">Dive log</p>
                <h2>Start your session</h2>
            </div>
            <div class="auth-toggle" role="tablist" aria-label="Authentication mode">
                <button class="active" type="button" role="tab" aria-selected="true" data-auth-tab="login" data-auth-action="{{ url_for('login') }}" data-auth-submit="Log in" data-auth-title="Start your session">Log in</button>
                <button type="button" role="tab" aria-selected="false" data-auth-tab="signup" data-auth-action="{{ url_for('signup') }}" data-auth-submit="Create account" data-auth-title="Create your account">Sign up</button>
            </div>
            <form class="auth-form" method="post" action="{{ url_for('login') }}" data-auth-form>
                <label>
                    Username
                    <input name="username" autocomplete="username" required>
                </label>
                <label>
                    Password
                    <input name="password" type="password" autocomplete="current-password" required>
                </label>
                <button class="primary-button" type="submit" data-auth-submit-button>Log in</button>
            </form>
        </section>
    </div>
</section>
{% endblock %}
