{% extends "base.html" %}
{% block title %}Pelagia{% endblock %}
{% block body_class %}landing-body{% endblock %}

{% block content %}
<section class="landing-hero">
    <div class="landing-copy">
        <span class="brand-mark large"></span>
        <h1>Pelagia</h1>
        <p>Log dives, share blue-water moments, and build a map of every place you have been beneath the surface.</p>
    </div>
    <div class="auth-grid">
        <form class="auth-panel" method="post" action="{{ url_for('login') }}">
            <h2>Log in</h2>
            <label>
                Username
                <input name="username" autocomplete="username" required>
            </label>
            <label>
                Password
                <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <button class="primary-button" type="submit">Log in</button>
        </form>
        <form class="auth-panel accent" method="post" action="{{ url_for('signup') }}">
            <h2>Sign up</h2>
            <label>
                Username
                <input name="username" autocomplete="username" minlength="3" required>
            </label>
            <label>
                Password
                <input name="password" type="password" autocomplete="new-password" minlength="6" required>
            </label>
            <button class="primary-button" type="submit">Create account</button>
        </form>
    </div>
</section>
{% endblock %}
